# ============================================================================
#  Configuracion de Cloudflare Pages (wrangler)
# ----------------------------------------------------------------------------
#  Estructura del deploy:
#    - Assets estaticos:  web_dashboard/  (index.html, styles.css, app.js)
#    - Pages Functions:   functions/api/*.js  (en la RAIZ del proyecto)
#      -> se publican como /api/signal y /api/telegram
#
#  IMPORTANTE (Cloudflare Pages): la carpeta de Functions debe llamarse
#  "functions/" y estar en la RAIZ del proyecto (junto a este wrangler.toml),
#  NO dentro de la carpeta de assets. Wrangler la compila automaticamente al
#  desplegar (se ve "Compiled Worker successfully" / "Uploading Functions bundle").
#
#  Deploy:
#    npx wrangler pages deploy web_dashboard --project-name=agc-tradingview-ai-signals --branch=main --commit-dirty=true
#
#  Variables de entorno (NO se ponen aqui; se cargan como secrets en el panel
#  de Cloudflare o con `wrangler pages secret put`):
#    OPENAI_API_KEY       -> explicacion real de señales con OpenAI (opcional)
#    TELEGRAM_BOT_TOKEN   -> envio real de avisos por Telegram (opcional)
#    TELEGRAM_CHAT_ID     -> chat destino por defecto de los avisos (opcional)
#  Sin esas variables, las funciones responden en modo simulado (mock) con el
#  disclaimer incluido.
# ============================================================================

name = "agc-tradingview-ai-signals"
compatibility_date = "2024-05-01"
pages_build_output_dir = "web_dashboard"
